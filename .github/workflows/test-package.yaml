# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  workflow_dispatch:

name: test-package.yaml

permissions:
  contents: read
  packages: write

jobs:
  prepare-image:
    uses: ./.github/workflows/prepare-cment-env-image.yaml
    with:
      dockerfile: ".github/docker/cment-env/Dockerfile"
      docker_context: "."
      docker_dir: ".github/docker/cment-env"
      image_suffix: "cment-env"

  check:
    needs:
      - prepare-image
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.prepare-image.outputs.image_uri  }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
    
      - name: Check package
        uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: always
          build_args: 'c("--no-manual", "--compact-vignettes=gs+qpdf")'
          check_args: 'c("--no-manual", "--no-tests")'
          
    
  coverage:
    needs:
      - prepare-image
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.prepare-image.outputs.image_uri  }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}


    steps:
      - uses: actions/checkout@v4
      - name: Install current package source
        run: |
          R CMD INSTALL .

      - name: Test coverage
        run: |
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(normalizePath(Sys.getenv("RUNNER_TEMP"), winslash = "/"), "package")
          )
          print(cov)
          covr::to_cobertura(cov)
        shell: Rscript {0}

      - uses: codecov/codecov-action@v5
        with:
          # Fail if error if not on PR, or if on PR and token is given
          fail_ci_if_error: ${{ github.event_name != 'pull_request' || secrets.CODECOV_TOKEN }}
          files: ./cobertura.xml
          plugins: noop
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Show testthat output
        if: always()
        run: |
          ## --------------------------------------------------------------------
          find '${{ runner.temp }}/package' -name 'testthat.Rout*' -exec cat '{}' \; || true
        shell: bash

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-test-failures
          path: ${{ runner.temp }}/package
