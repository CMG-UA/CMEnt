on:
  workflow_dispatch:
  pull_request:
    branches: [main, master]
    paths:
      - "notebooks/**"
      - "DESCRIPTION"
      - ".github/workflows/render-notebooks.yaml"

name: Render and deploy notebooks

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install rendering dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::rmarkdown
            any::knitr
            any::BiocStyle
            any::sessioninfo
            deps::.

      - name: Render notebooks to _site/articles
        shell: Rscript {0}
        run: |
          dir.create("_site/articles", recursive = TRUE, showWarnings = FALSE)

          notebooks <- list.files(
            "notebooks",
            pattern = "\\.(Rmd|qmd)$",
            full.names = TRUE
          )

          if (length(notebooks) == 0L) {
            message("No notebooks found.")
            quit(save = "no", status = 0)
          }

          for (nb in notebooks) {
            message("Rendering: ", nb)

            out_file <- paste0(
              tools::file_path_sans_ext(basename(nb)),
              ".html"
            )

            if (grepl("\\.qmd$", nb, ignore.case = TRUE)) {
              if (!nzchar(Sys.which("quarto"))) {
                stop("Quarto notebook found, but quarto is not installed.")
              }

              system2(
                "quarto",
                args = c(
                  "render",
                  nb,
                  "--to", "html",
                  "--output-dir", "_site/articles"
                ),
                stdout = TRUE,
                stderr = TRUE
              )
            } else {
              rmarkdown::render(
                input = nb,
                output_format = "html_document",
                output_dir = "_site/articles",
                output_file = out_file,
                envir = new.env(parent = globalenv()),
                quiet = FALSE
              )
            }
          }

      - name: Create index page
        shell: Rscript {0}
        run: |
          html_files <- list.files(
            "_site/articles",
            pattern = "\\.html$",
            recursive = FALSE,
            full.names = FALSE
          )

          links <- paste0(
            '<li><a href="articles/', html_files, '">',
            tools::file_path_sans_ext(html_files),
            "</a></li>",
            collapse = "\n"
          )

          index <- paste0(
            '<!DOCTYPE html>\n',
            '<html>\n',
            '<head>\n',
            '  <meta charset="utf-8">\n',
            '  <title>Extended notebooks</title>\n',
            '</head>\n',
            '<body>\n',
            '  <h1>Extended notebooks</h1>\n',
            '  <ul>\n',
            links,
            '\n  </ul>\n',
            '</body>\n',
            '</html>\n'
          )

          writeLines(index, "_site/index.html")

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "_site"
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: render

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4