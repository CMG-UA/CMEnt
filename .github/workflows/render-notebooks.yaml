name: Render notebooks

on:
  workflow_dispatch:
  pull_request:
    branches: [main, master]
    
permissions:
  contents: write

jobs:
  render-notebooks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install rendering dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::rmarkdown
            any::knitr
            any::BiocStyle
            any::sessioninfo
            deps::.

      - name: Render notebooks to docs/articles
        shell: Rscript {0}
        run: |
          dir.create("docs/articles", recursive = TRUE, showWarnings = FALSE)

          notebooks <- list.files(
            "notebooks",
            pattern = "\\.(Rmd|qmd)$",
            full.names = TRUE
          )

          if (length(notebooks) == 0L) {
            message("No notebooks found.")
            quit(save = "no", status = 0)
          }

          for (nb in notebooks) {
            message("Rendering: ", nb)

            out_file <- paste0(
              tools::file_path_sans_ext(basename(nb)),
              ".html"
            )

            if (grepl("\\.qmd$", nb, ignore.case = TRUE)) {
              if (!nzchar(Sys.which("quarto"))) {
                stop("Quarto notebook found, but quarto is not installed.")
              }

              system2(
                "quarto",
                args = c(
                  "render",
                  nb,
                  "--to", "html",
                  "--output-dir", "docs/articles"
                ),
                stdout = TRUE,
                stderr = TRUE
              )
            } else {
              rmarkdown::render(
                input = nb,
                output_format = "html_document",
                output_dir = "docs/articles",
                output_file = out_file,
                envir = new.env(parent = globalenv()),
                quiet = FALSE
              )
            }
          }

      - name: Create index page
        shell: Rscript {0}
        run: |
          html_files <- list.files(
            "docs/articles",
            pattern = "\\.html$",
            recursive = FALSE,
            full.names = FALSE
          )

          links <- paste0(
            '<li><a href="articles/', html_files, '">',
            tools::file_path_sans_ext(html_files),
            "</a></li>",
            collapse = "\n"
          )

          index <- paste0(
            '<!DOCTYPE html>\n',
            '<html>\n',
            '<head>\n',
            '  <meta charset="utf-8">\n',
            '  <title>Extended notebooks</title>\n',
            '</head>\n',
            '<body>\n',
            '  <h1>Extended notebooks</h1>\n',
            '  <ul>\n',
            links,
            '\n  </ul>\n',
            '</body>\n',
            '</html>\n'
          )

          writeLines(index, "docs/index.html")

      - name: Commit rendered HTML
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Render notebooks"
          file_pattern: docs/