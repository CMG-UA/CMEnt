name: Render and deploy notebooks

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  prepare-image:
    uses: ./.github/workflows/prepare-cment-env-image.yaml
    with:
      dockerfile: ".github/docker/cment-env/Dockerfile"
      docker_context: "."
      docker_dir: ".github/docker/cment-env"
      image_suffix: "cment-env"
  render:
    runs-on: ubuntu-latest

    needs:
      - prepare-image

    container:
      image: ${{ needs.prepare-image.outputs.image_uri  }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install current package source
        run: |
          R CMD INSTALL .

      - name: Render notebooks
        shell: Rscript {0}
        run: |
          site_dir <- "_site"
          articles_dir <- file.path(site_dir, "articles")

          dir.create(articles_dir, recursive = TRUE, showWarnings = FALSE)

          notebooks <- list.files(
            "notebooks",
            pattern = "\\.Rmd$",
            full.names = TRUE
          )

          if (length(notebooks) == 0L) {
            message("No Rmd notebooks found.")
          } else {
            for (nb in notebooks) {
              message("Rendering: ", nb)

              out_file <- paste0(
                tools::file_path_sans_ext(basename(nb)),
                ".html"
              )

              rmarkdown::render(
                input = nb,
                output_format = "html_document",
                output_dir = articles_dir,
                output_file = out_file,
                envir = new.env(parent = globalenv()),
                quiet = FALSE
              )
            }
          }

          html_files <- list.files(
            articles_dir,
            pattern = "\\.html$",
            full.names = FALSE
          )

          links <- if (length(html_files) > 0L) {
            paste0(
              '<li><a href="articles/', html_files, '">',
              tools::file_path_sans_ext(html_files),
              "</a></li>",
              collapse = "\n"
            )
          } else {
            "<li>No rendered notebooks found.</li>"
          }

          index <- paste0(
            '<!DOCTYPE html>\n',
            '<html>\n',
            '<head>\n',
            '  <meta charset="utf-8">\n',
            '  <title>Extended notebooks</title>\n',
            '</head>\n',
            '<body>\n',
            '  <h1>Extended notebooks</h1>\n',
            '  <ul>\n',
            links,
            '\n  </ul>\n',
            '</body>\n',
            '</html>\n'
          )

          writeLines(index, file.path(site_dir, "index.html"))

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "_site"

  deploy:
    runs-on: ubuntu-latest
    needs: render

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4