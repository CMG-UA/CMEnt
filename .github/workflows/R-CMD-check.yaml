on:
  workflow_dispatch:
  pull_request:
    branches: [main, master]

name: R-CMD-check

permissions: read-all

jobs:
  R-CMD-check:
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})
    runs-on: ${{ matrix.config.os }}
    defaults:
      run:
        shell: bash -el {0}

    strategy:
      fail-fast: false
      matrix:
        config:
          - { os: macos-latest,   r: "release" }
          - { os: ubuntu-latest,  r: "release" }

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - name: Cache conda packages
        uses: actions/cache@v4
        env:
          CACHE_NUMBER: 0
        with:
          path: ~/conda_pkgs_dir
          key: ${{ runner.os }}-conda-${{ env.CACHE_NUMBER }}-${{ hashFiles('envs/ci_env.yaml') }}
          restore-keys: |
            ${{ runner.os }}-conda-${{ env.CACHE_NUMBER }}-

      - name: Setup conda env
        uses: conda-incubator/setup-miniconda@v3.3.0
        with:
          channels: conda-forge,bioconda
          channel-priority: strict
          environment-file: envs/ci_env.yaml
          auto-activate: true

      - name: Debug conda
        run: |
          conda info --envs
          conda env export -n ci_env

      - name: Install macOS system dependencies
        if: matrix.config.os == 'macos-latest'
        run: |
          brew install imagemagick@6
          brew install libgit2 openssl libxml2 curl

      - name: Install Linux system dependencies
        if: matrix.config.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libmagick++-dev libgit2-dev libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Download r-ci helper
        run: |
          curl -OLs https://eddelbuettel.github.io/r-ci/run.sh
          chmod 0755 run.sh
        shell: bash

      - name: Bootstrap r-ci
        run: |
          export BACKEND=BSPM
          ./run.sh bootstrap
        shell: bash

      - name: Discover R cache path
        id: r-cache
        run: |
          libs <- unique(c(.Library.site, file.path(dirname(.Library), "site-library")))
          libs <- libs[nzchar(libs)]
          libs <- libs[libs != .Library]
          writeLines(c(
            sprintf("version=%s", getRversion()),
            sprintf("platform=%s", R.version$platform),
            "paths<<EOF",
            libs,
            "EOF"
          ), Sys.getenv("GITHUB_OUTPUT"))
        shell: Rscript {0}

      - name: Prepare R cache paths
        run: |
          while IFS= read -r lib; do
            [ -n "$lib" ] || continue
            sudo mkdir -p "$lib"
            sudo chmod 2777 "$lib"
          done <<'EOF'
          ${{ steps.r-cache.outputs.paths }}
          EOF
        shell: bash

      - name: Cache R site libraries
        id: r-deps-cache
        uses: actions/cache@v4
        env:
          CACHE_NUMBER: 0
        with:
          path: ${{ steps.r-cache.outputs.paths }}
          key: ${{ runner.os }}-${{ steps.r-cache.outputs.platform }}-r-site-library-${{ steps.r-cache.outputs.version }}-${{ env.CACHE_NUMBER }}-${{ hashFiles('DESCRIPTION', '.github/workflows/R-CMD-check.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ steps.r-cache.outputs.platform }}-r-site-library-${{ steps.r-cache.outputs.version }}-${{ env.CACHE_NUMBER }}-

      - name: Setup r-ci
        id: r-ci
        run: |
          export BACKEND=BSPM
          for pkg in knitr rmarkdown rcmdcheck devtools magick; do
            if ! Rscript -e "quit(status = !requireNamespace('${pkg}', quietly = TRUE))"; then
              ./run.sh install_r "${pkg}"
            fi
          done
          ./run.sh install_deps
          if ! Rscript -e "quit(status = !requireNamespace('BiocStyle', quietly = TRUE))"; then
            ./run.sh install_bioc BiocStyle
          fi
        shell: bash

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: always
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf", "--no-tests")'
