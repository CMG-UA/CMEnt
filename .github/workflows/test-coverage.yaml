# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  workflow_dispatch:
  pull_request:
    branches: [main, master]

name: test-coverage.yaml

permissions: read-all

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    defaults:
      run:
        shell: bash -l {0}
        
    strategy:
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Cache conda packages
        uses: actions/cache@v4
        env:
          CACHE_NUMBER: 0
        with:
          path: ~/conda_pkgs_dir
          key: ${{ runner.os }}-conda-${{ env.CACHE_NUMBER }}-${{ hashFiles('envs/ci_env.yaml') }}
          restore-keys: |
            ${{ runner.os }}-conda-${{ env.CACHE_NUMBER }}-

      - name: Setup conda env
        uses: conda-incubator/setup-miniconda@v3.3.0
        with:
          channels: conda-forge,bioconda,defaults
          channel-priority: strict
          environment-file: envs/ci_env.yaml
          auto-activate: true
          use-only-tar-bz2: true

      - name: Debug conda
        run: |
          conda info --envs
          conda env export -n ci_env

      - name: Download r-ci helper
        run: |
          curl -OLs https://eddelbuettel.github.io/r-ci/run.sh
          chmod 0755 run.sh
        shell: bash

      - name: Bootstrap r-ci
        run: |
          export BACKEND=BSPM
          ./run.sh bootstrap
        shell: bash

      - name: Discover R cache path
        id: r-cache
        run: |
          libs <- unique(c(.Library.site, file.path(dirname(.Library), "site-library")))
          libs <- libs[nzchar(libs)]
          libs <- libs[libs != .Library]
          writeLines(c(
            sprintf("version=%s", getRversion()),
            sprintf("platform=%s", R.version$platform),
            "paths<<EOF",
            libs,
            "EOF"
          ), Sys.getenv("GITHUB_OUTPUT"))
        shell: Rscript {0}

      - name: Prepare R cache paths
        run: |
          while IFS= read -r lib; do
            [ -n "$lib" ] || continue
            sudo mkdir -p "$lib"
            sudo chmod 2777 "$lib"
          done <<'EOF'
          ${{ steps.r-cache.outputs.paths }}
          EOF
        shell: bash

      - name: Cache R site libraries
        id: r-deps-cache
        uses: actions/cache@v4
        env:
          CACHE_NUMBER: 0
        with:
          path: ${{ steps.r-cache.outputs.paths }}
          key: ${{ runner.os }}-${{ steps.r-cache.outputs.platform }}-r-site-library-${{ steps.r-cache.outputs.version }}-${{ env.CACHE_NUMBER }}-${{ hashFiles('DESCRIPTION', '.github/workflows/test-coverage.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ steps.r-cache.outputs.platform }}-r-site-library-${{ steps.r-cache.outputs.version }}-${{ env.CACHE_NUMBER }}-

      - name: Setup R dependencies
        run: |
          export BACKEND=BSPM
          for pkg in covr xml2 rcmdcheck IlluminaHumanMethylation450kanno.ilmn12.hg19 IlluminaHumanMethylationEPICanno.ilm10b4.hg19 BSgenome.Hsapiens.UCSC.hg19 mockery; do
            if ! Rscript -e "quit(status = !requireNamespace('${pkg}', quietly = TRUE))"; then
              ./run.sh install_r "${pkg}"
            fi
          done
          ./run.sh install_deps
        shell: bash

      - name: Test coverage
        run: |
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(normalizePath(Sys.getenv("RUNNER_TEMP"), winslash = "/"), "package")
          )
          print(cov)
          covr::to_cobertura(cov)
        shell: Rscript {0}

      - uses: codecov/codecov-action@v5
        with:
          # Fail if error if not on PR, or if on PR and token is given
          fail_ci_if_error: ${{ github.event_name != 'pull_request' || secrets.CODECOV_TOKEN }}
          files: ./cobertura.xml
          plugins: noop
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Show testthat output
        if: always()
        run: |
          ## --------------------------------------------------------------------
          find '${{ runner.temp }}/package' -name 'testthat.Rout*' -exec cat '{}' \; || true
        shell: bash

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-test-failures
          path: ${{ runner.temp }}/package
